name: Telegram → Notion Job Clipper

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  clip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install telethon requests

      - name: Run bot
        env:
          TG_API_ID:          ${{ secrets.TG_API_ID }}
          TG_API_HASH:        ${{ secrets.TG_API_HASH }}
          TG_SESSION:         ${{ secrets.TG_SESSION }}
          TG_CHANNEL:         ${{ secrets.TG_CHANNEL }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python bot.py

      - name: Save last message ID
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_message_id.txt
          git diff --staged --quiet || git commit -m "chore: update last_message_id"
          git push
